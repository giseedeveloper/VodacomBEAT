# Local Docker Desktop — BEAT stack for Phase 2 testing
services:
  mysql:
    image: mysql:8.0
    container_name: vodacom-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: vodacom-caller-tunes
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: vodacom-redis
    restart: unless-stopped
    # No host port — avoid conflict with other stacks on 6379

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vodacom-api
    restart: unless-stopped
    ports:
      # Host 8010 — avoid conflict with other apps on 8000
      - "8010:8000"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8010
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: vodacom-caller-tunes
      DB_USERNAME: root
      DB_PASSWORD: secret
      QUEUE_CONNECTION: sync
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BEAT_AI_WORKER_URL: http://ai-worker:8080
      BEAT_AI_WORKER_TOKEN: ${BEAT_AI_WORKER_TOKEN:-}
      BEAT_LLM_BASE_URL: ${BEAT_LLM_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      BEAT_LLM_API_KEY: ${BEAT_LLM_API_KEY:-}
      BEAT_LLM_MODEL: ${BEAT_LLM_MODEL:-gemini-flash-lite-latest}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-lite-latest}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-eastus}
      BEAT_TTS_PROVIDER: ${BEAT_TTS_PROVIDER:-azure}
      BEAT_DEFAULT_VOICE_ID: ${BEAT_DEFAULT_VOICE_ID:-daudi-professional}
      BEAT_MMS_MODEL_ID: ${BEAT_MMS_MODEL_ID:-facebook/mms-tts-swh}
      BEAT_SCRIPT_MAX_DURATION_SECONDS: ${BEAT_SCRIPT_MAX_DURATION_SECONDS:-40}
      BEAT_SCRIPT_MAXIMUM_WORDS: ${BEAT_SCRIPT_MAXIMUM_WORDS:-95}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      ai-worker:
        condition: service_started

  ai-worker:
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    container_name: beat-ai-worker
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      REDIS_URL: redis://redis:6379/0
      BEAT_AI_WORKER_TOKEN: ${BEAT_AI_WORKER_TOKEN:-}
      BEAT_TTS_PROVIDER: ${BEAT_TTS_PROVIDER:-azure}
      BEAT_VOICES_MANIFEST: /app/voices/manifest.json
      BEAT_DEFAULT_VOICE_ID: ${BEAT_DEFAULT_VOICE_ID:-daudi-professional}
      BEAT_LLM_BASE_URL: ${BEAT_LLM_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      BEAT_LLM_API_KEY: ${BEAT_LLM_API_KEY:-}
      BEAT_LLM_MODEL: ${BEAT_LLM_MODEL:-gemini-flash-lite-latest}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-lite-latest}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-eastus}
      BEAT_SCRIPT_MAX_DURATION_SECONDS: ${BEAT_SCRIPT_MAX_DURATION_SECONDS:-40}
      BEAT_SCRIPT_MAXIMUM_WORDS: ${BEAT_SCRIPT_MAXIMUM_WORDS:-95}
    volumes:
      - ./ai-worker/app:/app/app
      - ./ai-worker/voices:/app/voices:ro
      - ./ai-worker/music:/app/music:ro
      - ./models:/app/models:ro
      - beat_hf_cache:/root/.cache/huggingface
    depends_on:
      - redis

  customer:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: vodacom-customer
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./portals/customer:/app
      - customer_node_modules:/app/node_modules
    environment:
      PORT: 3000
      WDS_SOCKET_PORT: 3000
      NODE_ENV: development
      REACT_APP_API_URL: http://localhost:8010
      # Browser calls host-mapped API; signed audio URLs use APP_URL
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - api

volumes:
  mysql_data:
  customer_node_modules:
  beat_hf_cache:
