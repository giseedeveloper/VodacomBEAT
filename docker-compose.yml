services:
  mysql:
    image: mysql:8.0
    container_name: vodacom-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: vodacom-caller-tunes
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vodacom-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: vodacom-caller-tunes
      DB_USERNAME: root
      DB_PASSWORD: secret
    depends_on:
      mysql:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: docker/admin/Dockerfile
    container_name: vodacom-admin
    restart: unless-stopped
    ports:
      - "3332:3332"
    environment:
      PORT: 3332
      WDS_SOCKET_PORT: 3332
      NODE_ENV: development

  customer:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: vodacom-customer
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./portals/customer:/app
      - customer_node_modules:/app/node_modules
    environment:
      PORT: 3000
      WDS_SOCKET_PORT: 3000
      NODE_ENV: development

  agents:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: vodacom-agents
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./portals/vodacom-agents-portal:/app
      - agents_node_modules:/app/node_modules
    environment:
      PORT: 3001
      WDS_SOCKET_PORT: 3001
      NODE_ENV: development

  referrals:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: vodacom-referrals
    restart: unless-stopped
    ports:
      - "3002:3002"
    volumes:
      - ./portals/referrals-agents-portal:/app
      - referrals_node_modules:/app/node_modules
    environment:
      PORT: 3002
      WDS_SOCKET_PORT: 3002
      NODE_ENV: development

volumes:
  mysql_data:
  admin_node_modules:
  customer_node_modules:
  agents_node_modules:
  referrals_node_modules:
