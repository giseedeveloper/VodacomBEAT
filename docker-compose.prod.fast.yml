# Production: pre-built portals + fast PHP image (no yarn/compile on VPS).
services:
  mysql:
    image: mysql:8.0
    container_name: vodacom-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-vodacom_secret_2026}
      MYSQL_DATABASE: vodacom-caller-tunes
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-vodacom_secret_2026}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - vodacom

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vodacom-api
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://165.22.124.111:8000}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: vodacom-caller-tunes
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-vodacom_secret_2026}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/var/www/html
    networks:
      - vodacom

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.prebuilt
    container_name: vodacom-web
    restart: unless-stopped
    ports:
      - "443:443"
      - "3332:3332"
      - "3001:3001"
      - "3002:3002"
      - "8000:8000"
    depends_on:
      - api
    environment:
      SERVER_IP: ${SERVER_IP:-165.22.124.111}
    networks:
      - vodacom

volumes:
  mysql_data:

networks:
  vodacom:
    driver: bridge
