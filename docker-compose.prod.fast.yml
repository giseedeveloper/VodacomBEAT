# Production: pre-built portals + fast PHP image (no yarn/compile on VPS).
services:
  mysql:
    image: mysql:8.0
    container_name: vodacom-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-vodacom_secret_2026}
      MYSQL_DATABASE: vodacom-caller-tunes
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-vodacom_secret_2026}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - vodacom

  redis:
    image: redis:7-alpine
    container_name: vodacom-redis
    restart: unless-stopped
    networks:
      - vodacom

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vodacom-api
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://165.22.124.111:8000}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: vodacom-caller-tunes
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-vodacom_secret_2026}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BEAT_AI_WORKER_URL: http://ai-worker:8080
      BEAT_AI_WORKER_TOKEN: ${BEAT_AI_WORKER_TOKEN:-}
      BEAT_LLM_BASE_URL: ${BEAT_LLM_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      BEAT_LLM_API_KEY: ${BEAT_LLM_API_KEY:-}
      BEAT_LLM_MODEL: ${BEAT_LLM_MODEL:-gemini-2.5-flash-lite}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-southafricanorth}
      BEAT_TTS_PROVIDER: ${BEAT_TTS_PROVIDER:-azure}
      BEAT_DEFAULT_VOICE_ID: ${BEAT_DEFAULT_VOICE_ID:-daudi-professional}
      BEAT_MMS_MODEL_ID: ${BEAT_MMS_MODEL_ID:-facebook/mms-tts-swh}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/var/www/html
    networks:
      - vodacom

  api-queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vodacom-api-queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3"]
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: vodacom-caller-tunes
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-vodacom_secret_2026}
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BEAT_AI_WORKER_URL: http://ai-worker:8080
      BEAT_AI_WORKER_TOKEN: ${BEAT_AI_WORKER_TOKEN:-}
      BEAT_LLM_BASE_URL: ${BEAT_LLM_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      BEAT_LLM_API_KEY: ${BEAT_LLM_API_KEY:-}
      BEAT_LLM_MODEL: ${BEAT_LLM_MODEL:-gemini-2.5-flash-lite}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-southafricanorth}
      BEAT_TTS_PROVIDER: ${BEAT_TTS_PROVIDER:-azure}
      BEAT_DEFAULT_VOICE_ID: ${BEAT_DEFAULT_VOICE_ID:-daudi-professional}
      BEAT_MMS_MODEL_ID: ${BEAT_MMS_MODEL_ID:-facebook/mms-tts-swh}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      ai-worker:
        condition: service_started
    volumes:
      - .:/var/www/html
    networks:
      - vodacom

  ai-worker:
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    container_name: beat-ai-worker
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      BEAT_AI_WORKER_TOKEN: ${BEAT_AI_WORKER_TOKEN:-}
      BEAT_TTS_PROVIDER: ${BEAT_TTS_PROVIDER:-azure}
      BEAT_VOICES_MANIFEST: /app/voices/manifest.json
      BEAT_LLM_BASE_URL: ${BEAT_LLM_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      BEAT_LLM_API_KEY: ${BEAT_LLM_API_KEY:-}
      BEAT_LLM_MODEL: ${BEAT_LLM_MODEL:-gemini-2.5-flash-lite}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-southafricanorth}
    depends_on:
      - redis
    volumes:
      - ./models:/app/models:ro
      - beat_hf_cache:/root/.cache/huggingface
    networks:
      - vodacom

  ai-worker-rq:
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    container_name: beat-ai-worker-rq
    restart: unless-stopped
    command: ["rq", "worker", "--url", "redis://redis:6379/0", "beat_script"]
    environment:
      REDIS_URL: redis://redis:6379/0
      BEAT_TTS_PROVIDER: ${BEAT_TTS_PROVIDER:-azure}
      BEAT_LLM_BASE_URL: ${BEAT_LLM_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      BEAT_LLM_API_KEY: ${BEAT_LLM_API_KEY:-}
      BEAT_LLM_MODEL: ${BEAT_LLM_MODEL:-gemini-2.5-flash-lite}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-southafricanorth}
    depends_on:
      - redis
    volumes:
      - ./models:/app/models:ro
      - beat_hf_cache:/root/.cache/huggingface
    networks:
      - vodacom

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.prebuilt
    container_name: vodacom-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "3332:3332"
      - "3001:3001"
      - "3002:3002"
      - "8000:8000"
    depends_on:
      - api
    environment:
      SERVER_IP: ${SERVER_IP:-165.22.124.111}
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - vodacom

volumes:
  mysql_data:
  beat_hf_cache:

networks:
  vodacom:
    driver: bridge
